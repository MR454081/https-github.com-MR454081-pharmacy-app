{% extends 'admin/base.html' %}
{% block title %}Admin Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Admin Registration</h1>
        <form method="post" class="needs-validation" novalidate>
          <div class="mb-3"><label class="form-label">Name</label><input type="text" name="name" class="form-control" required /></div>
          <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required /></div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input type="password" name="password" class="form-control" data-password-input required minlength="6" />
              <button class="btn btn-outline-secondary" type="button" data-toggle-password>Show</button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Registration Code (if configured)</label>
            <input type="text" name="registration_code" class="form-control" />
          </div>
          <button class="btn btn-dark w-100">Register Admin</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
