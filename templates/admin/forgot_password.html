{% extends 'admin/base.html' %}
{% block title %}Admin Forgot Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Admin Password Reset</h1>
        <form method="post" class="needs-validation" novalidate>
          <div class="mb-3"><label class="form-label">Email</label><input type="email" name="email" class="form-control" required /></div>
          <div class="mb-3"><label class="form-label">OTP</label><input type="text" name="otp" class="form-control" maxlength="6" placeholder="Enter OTP" /></div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <div class="input-group">
              <input type="password" name="new_password" class="form-control" data-password-input />
              <button class="btn btn-outline-secondary" type="button" data-toggle-password>Show</button>
            </div>
          </div>
          <div class="d-grid gap-2">
            <button class="btn btn-outline-dark" name="action" value="send_otp">Send OTP</button>
            <button class="btn btn-dark" name="action" value="reset_password">Reset Password</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
