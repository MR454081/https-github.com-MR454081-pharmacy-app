<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}Admin - Healthcare Pharmacy{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="{{ url_for('admin_dashboard') }}">Admin Panel</a>
    {% if admin_logged_in %}
    <div>
      <a class="btn btn-sm btn-outline-light" href="{{ url_for('admin_dashboard') }}">Dashboard</a>
      <a class="btn btn-sm btn-outline-light" href="{{ url_for('admin_medicines') }}">Medicines</a>
      <a class="btn btn-sm btn-outline-light" href="{{ url_for('admin_orders') }}">Orders</a>
      <a class="btn btn-sm btn-outline-light" href="{{ url_for('admin_users') }}">Users</a>
      <a class="btn btn-sm btn-warning" href="{{ url_for('admin_logout') }}">Logout</a>
    </div>
    {% endif %}
  </div>
</nav>
<main class="container py-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
