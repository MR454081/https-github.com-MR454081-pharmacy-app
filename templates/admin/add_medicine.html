{% extends 'admin/base.html' %}
{% block title %}Add Medicine{% endblock %}
{% block content %}
<h1 class="h4 mb-3">Add Medicine</h1>
<div class="card shadow-sm"><div class="card-body">
<form method="post" enctype="multipart/form-data" class="row g-3">
  <div class="col-md-6"><label class="form-label">Name</label><input class="form-control" name="name" required /></div>
  <div class="col-md-6"><label class="form-label">Category</label><input class="form-control" name="category" required /></div>
  <div class="col-md-4"><label class="form-label">Price</label><input type="number" step="0.01" class="form-control" name="price" required /></div>
  <div class="col-md-4"><label class="form-label">Stock</label><input type="number" class="form-control" name="stock" required /></div>
  <div class="col-md-4"><label class="form-label">Image</label><input type="file" class="form-control" name="image" accept=".jpg,.jpeg,.png" /></div>
  <div class="col-12"><label class="form-label">Description</label><textarea class="form-control" rows="3" name="description"></textarea></div>
  <div class="col-12"><div class="form-check"><input class="form-check-input" type="checkbox" name="prescription_required" id="rx" /><label class="form-check-label" for="rx">Prescription Required</label></div></div>
  <div class="col-12"><button class="btn btn-dark">Save</button></div>
</form>
</div></div>
{% endblock %}
