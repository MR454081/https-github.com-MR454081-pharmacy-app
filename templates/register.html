{% extends 'base.html' %}
{% block title %}Customer Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Create Customer Account</h1>
        <form method="post" class="needs-validation" novalidate>
          <div class="row g-3">
            <div class="col-md-6">
              <label class="form-label">Full Name</label>
              <input type="text" name="name" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Email</label>
              <input type="email" name="email" class="form-control" required />
            </div>
            <div class="col-md-6">
              <label class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control" />
            </div>
            <div class="col-md-6">
              <label class="form-label">Password</label>
              <div class="input-group">
                <input type="password" name="password" class="form-control" minlength="6" required data-password-input />
                <button class="btn btn-outline-secondary" type="button" data-toggle-password>Show</button>
              </div>
            </div>
            <div class="col-12">
              <label class="form-label">Address</label>
              <textarea name="address" rows="2" class="form-control"></textarea>
            </div>
          </div>
          <button class="btn btn-primary mt-3">Register</button>
        </form>
        <div class="mt-3">
          <a href="{{ url_for('login') }}" class="small">Already have an account? Login</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
