{% extends 'base.html' %}
{% block title %}Customer Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h4 mb-3">Customer Login</h1>
        <form method="post" class="needs-validation" novalidate>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" name="email" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <div class="input-group">
              <input type="password" name="password" class="form-control" data-password-input required />
              <button class="btn btn-outline-secondary" type="button" data-toggle-password>Show</button>
            </div>
          </div>
          <button class="btn btn-primary w-100">Login</button>
        </form>
        <div class="mt-3 d-flex justify-content-between">
          <a href="{{ url_for('forgot_password') }}" class="small">Forgot Password?</a>
          <a href="{{ url_for('register') }}" class="small">Create customer account</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
